<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portal Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card card">
        <div class="eyebrow">Internal family portal</div>
        <h1>Portal login</h1>
        <p class="auth-copy">
          Sign in once and the portal will keep a browser session cookie instead of prompting with native Basic Auth on every request.
        </p>

        <form id="login-form" class="auth-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <div class="actions">
            <button type="submit">Sign In</button>
          </div>
        </form>

        <pre class="log auth-log" id="login-log">Enter your portal credentials.</pre>
      </section>
    </main>

    <script src="/login.js" type="module"></script>
  </body>
  </html>
